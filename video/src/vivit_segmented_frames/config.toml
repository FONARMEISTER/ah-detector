[data]
split_frames_dir   = "data/split-frames"
segmented_dir      = "data/SegmentedFrames"
# Frames root used only for statistics comparison
frames_dir         = "data/Frames"
num_classes        = 2
class_names        = ["No A-H", "With A-H"]

[image]
# CLIP (clip-vit-base-patch16) native resolution is 224x224
image_size  = 224
patch_size  = 16   # unused by CLIP encoder, kept for reference
channels    = 3
# ImageNet normalisation (CLIP uses the same stats)
mean = [0.485, 0.456, 0.406]
std  = [0.229, 0.224, 0.225]

[vivit]
model_name   = "google/vivit-b-16x2-kinetics400"
clip_len     = 32        # number of frames per clip (ViViT default)
clip_stride  = 16        # sliding window stride (overlap = clip_len - stride)
label_agg    = "any"     # "any" = clip is positive if ANY frame is 1; "video" = use video-level label

[vivit.training]
epochs        = 30
batch_size    = 4         # ViViT is memory-heavy; keep small
learning_rate = 2e-5      # lower LR for video transformer fine-tuning
weight_decay  = 1e-2
early_stopping_patience = 5

[vivit.output]
weights_dir  = "weights"
weights_name = "vivit_bah_best.pth"

