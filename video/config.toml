# ============================================================
# BAH Dataset — ViT Training Configuration
# ============================================================

[data]
split_frames_dir   = "data/split-frames"
segmented_dir      = "data/SegmentedFrames"
# Frames root used only for statistics comparison
frames_dir         = "data/Frames"
num_classes        = 2
class_names        = ["No A-H", "With A-H"]

[image]
# 128px is ~3x faster than 224px (attention is quadratic in token count)
image_size  = 128
patch_size  = 16
channels    = 3
# ImageNet normalisation
mean = [0.485, 0.456, 0.406]
std  = [0.229, 0.224, 0.225]

[model]
# ViT-Small — fast enough for CPU/MPS experimentation
# dim=256, depth=6, heads=8 → ~10M params vs ~86M for ViT-Base
dim          = 256
depth        = 6
heads        = 8
mlp_dim      = 512
dropout      = 0.1
emb_dropout  = 0.1
pool         = "cls"       # "cls" or "mean"

[training]
epochs        = 20
batch_size    = 64
learning_rate = 3e-4
weight_decay  = 1e-4
num_workers   = 0
seed          = 42
# Subsample: keep only 1 out of every N frames per video (1 = keep all).
# 4 cuts the 500k-frame train set to ~125k with minimal accuracy loss.
frame_subsample_every = 4
# Scheduler: cosine annealing
scheduler     = "cosine"   # "cosine" | "step" | "none"
# Early stopping patience (epochs without val-f1 improvement; 0 = disabled)
early_stopping_patience = 5

[augmentation]
# Applied only to train split
random_horizontal_flip  = true
random_rotation_degrees = 10
color_jitter_brightness = 0.2
color_jitter_contrast   = 0.2
color_jitter_saturation = 0.1
color_jitter_hue        = 0.05

[output]
weights_dir    = "weights"
weights_name   = "vit_bah_best.pth"
# Also save last epoch
save_last      = true
last_name      = "vit_bah_last.pth"
