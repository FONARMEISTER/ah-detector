# ============================================================
# BAH Dataset — Multimodal Fusion Training Configuration
# ============================================================
#
# Two-stage pipeline:
#   1) multimodal/src/extract_embeddings.py
#         — runs all three backbones K times per train sample with
#           augmented raw inputs; saves cache.
#   2) multimodal/src/fusion_training.py
#         — reads cache, trains the fusion MLP, evaluates on val/test.
#
# Stage 1 is run once (~K * 6-8 hours on CUDA).  Stage 2 is fast and can
# be re-run freely while tuning fusion hyperparameters.
#
# Architecture
# ------------
# Three frozen pretrained backbones extract per-modality embeddings:
#   - Text   : DistilRoBERTa-Emotional (j-hartmann/...)    → 768-d CLS embedding
#   - Audio  : Wav2Vec2-Emotional (xlsr-large)              → 256-d projected
#   - Video  : Swin-Tiny (mean-pooled over clip frames)     → 768-d pooled
#
# Each modality embedding is LayerNorm-normalised, then an attention gate
# (3 learned scalars → softmax) weights the modalities before concatenation
# and an MLP fusion head.
#
# Weight paths are relative to the repo root.

[data]
num_classes = 2
class_names = ["No A-H", "With A-H"]

# ── Text backbone (DistilRoBERTa-Emotional) ───────────────────────────────────
# Same architecture as `distilroberta-base` (6-layer RoBERTa, 82 M params)
# but pretrained on 7-way emotion classification.  We discard the emotion
# head and fine-tune on BAH A/H.  Rationale: A/H correlates with affect
# (anxiety, hesitation, frustration), so an emotion-tuned encoder mirrors
# the audio side's wav2vec2-emotional choice.
[text]
model_name   = "j-hartmann/emotion-english-distilroberta-base"
max_length   = 128
weights_path = "text/weights/distilroberta_emotional_bah_best.pth"

# ── Audio backbone ────────────────────────────────────────────────────────────
# ``backbone`` selects which encoder (and therefore which fine-tuned weights /
# cache file) we read.  Both backbones expose a 256-d projected embedding
# (classifier_proj_size), so downstream fusion code is unaffected by the
# choice — only the cache filename changes (``audio_<backbone>_embs_<split>.pt``).
[audio]
backbone        = "hubert"   # "wav2vec2emotional" | "hubert"
# Shared knobs (used by whichever backbone is selected).
sample_rate     = 16000
max_length_sec  = 30.0

# Per-backbone overrides.  The active block is the one whose name matches
# ``backbone``.  Caches live at ``audio_<backbone>_embs_<split>.pt`` so
# wav2vec2emotional and hubert embeddings can coexist on disk.
[audio.wav2vec2emotional]
model_name   = "ehcalabres/wav2vec2-lg-xlsr-en-speech-emotion-recognition"
weights_path = "audio/weights/wav2vec2emotional_bah_best.pth"

[audio.hubert]
model_name   = "superb/hubert-large-superb-er"
weights_path = "audio/weights/hubert_bah_best.pth"

# ── Video backbone ────────────────────────────────────────────────────────────
# ``backbone`` selects which encoder (and therefore which fine-tuned weights /
# clip length / cache file) we read.  Both backbones expose a 768-d temporal
# pool, so downstream fusion code is unaffected by the choice — only the
# cache filename changes (see ``cache_path_for`` in ``_extract_common.py``).
[video]
backbone     = "videomae"     # "swin" | "videomae"
# Shared knobs (used by whichever backbone is selected).
image_size   = 224
label_agg    = "any"

# Per-backbone overrides.  The active block is the one whose name matches
# ``backbone``.  Caches live at ``video_<backbone>_embs_<split>.pt`` so swin
# and videomae embeddings can coexist on disk.
[video.swin]
model_name   = "microsoft/swin-tiny-patch4-window7-224"
clip_len     = 32
clip_stride  = 16
weights_path = "video/weights/swin_bah_best.pth"

[video.videomae]
model_name   = "MCG-NJU/videomae-base"
clip_len     = 16
clip_stride  = 8
weights_path = "video/weights/videomae_bah_best.pth"

# ── Multi-view extraction (stage 1) ───────────────────────────────────────────
[extraction]
# Number of augmented embedding views per TRAIN sample per modality.
# Cost scales linearly: K=5 means stage 1 takes ~5x longer than the original
# single-view extraction.  Each epoch in stage 2 then picks one of the K
# views per modality independently → up to K^3 distinct combinations per
# training video.
num_views_train = 5
video_num_workers = 4 

# Number of views per val/test sample.  Almost always 1 — val/test must
# be deterministic for honest evaluation.
num_views_eval = 1

# Per-modality augmentation toggles for TRAIN views.  View 0 is ALWAYS clean
# for every modality; views 1..K-1 are augmented only when the per-modality
# flag is true.  Default: audio OFF — empirically, waveform augmentation hurts
# the frozen wav2vec2-emotional encoder (silence/noise/shift are OOD for an
# encoder pretrained on clean speech emotion).  Text and video augmentation
# remain on by default since their backbones tolerate (and in the text case
# even expect) input perturbations.
augment_text  = true
augment_audio = false
augment_video = true

# Splits to (re)extract.  Useful to restrict to ["train"] while iterating
# on augmentation settings if val/test caches are already produced.
splits = ["train", "val", "test"]

# Batch size used during embedding extraction.  Increase on bigger GPUs.
batch_size_embed = 8

# ── Augmentation knobs (stage 1) ──────────────────────────────────────────────
[augmentation]
# Text (word-level)
text_mask_prob  = 0.15       # probability of replacing a word with [MASK]
text_drop_prob  = 0.10       # probability of dropping a word entirely
text_mask_token = "[MASK]"

# Audio (waveform-level)
audio_gain              = 0.2     # ±20% random gain
audio_snr_db            = 25.0    # additive Gaussian noise SNR (dB)
audio_time_shift_sec    = 0.5     # max random shift in seconds
audio_num_time_masks    = 2       # number of silence windows
audio_time_mask_frac    = 0.05    # silence width as a fraction of the clip

# Video (clip-level; consistent across frames within a clip)
video_hflip_prob       = 0.5     # horizontal flip probability
video_brightness       = 0.2     # ±20% brightness jitter
video_contrast         = 0.2     # ±20% contrast jitter
video_n_frame_jitter   = 2       # number of frames replaced with neighbours

# ── Fusion head ───────────────────────────────────────────────────────────────
# Architecture: per-modality LayerNorm → concat → MLP with dropout → logits.
# Deliberately minimal: with ~1000 training videos, anything more elaborate
# (attention gates, modality-dropout, deep MLPs) overfits without help.
[fusion]
# Embedding dimensions
text_dim   = 768
audio_dim  = 256
video_dim  = 768

# ── Early-fusion preprocessor (applied to ALL classifiers) ────────────────────
# The unified pipeline is:
#   1) Load cached embeddings
#   2) StandardScaler per modality (fitted on TRAIN cache only)
#   3) Concatenate scaled modalities into a single fused vector
#   4) Optional PCA dimensionality reduction (fitted on TRAIN only)
#   5) Classifier (MLP / SVM / RF / GBM)
#
# `pca_components` controls step 4:
#   0      / "none" / false → skip PCA (use raw concatenated, scaled vector).
#   int N (>= 1)            → keep exactly N principal components.
#   float r in (0, 1)       → keep enough components to retain variance ratio r.
# Recommended starting points to combat overfitting on ~1000-sample datasets:
#   pca_components = 256          # fixed-size
#   pca_components = 0.95         # variance-driven
pca_components = 512
# Whiten PCA output (divide each component by its standard deviation).
# Useful when downstream classifier is distance-based (e.g. RBF SVC).
pca_whiten = false

# Hidden layer sizes.  Each hidden layer is (Linear → GELU → Dropout).
# Examples:
#   []         → plain logistic regression  : Linear(1792 → 2)
#   [128]      → 1-hidden-layer MLP         : 1792 → 128 → 2   (default)
#   [256, 64]  → 2-hidden-layer MLP         : 1792 → 256 → 64 → 2
hidden_dims = [128]

# Dropout probability applied after every hidden layer.
dropout = 0.3

# Label smoothing in CrossEntropyLoss (set to 0 to disable).
# Note: when mixup_alpha > 0 the training loss uses soft-target CE on Mixup
# batches and label_smoothing is implicitly already present via mixup, so
# this value only really matters at the start of training and for val loss.
label_smoothing = 0.1

# Embedding-space Mixup alpha.  lam ~ Beta(alpha, alpha).
# 0.4 is the canonical value for image classification; a higher value
# means more aggressive interpolation.  Set to 0.0 to disable.
mixup_alpha = 0.0

# Ablation: which modalities to use.
active_modalities = ["text", "audio", "video"]

# Directory for the multi-view embedding cache.
cache_dir = "multimodal/cache"

# Classifier type — switches the entire downstream training code path.
#   "mlp"               : neural MLP head with Mixup + Dropout (default).
#   "svm"               : sklearn SVC (RBF kernel).
#   "random_forest"     : sklearn RandomForestClassifier.
#   "gradient_boosting" : XGBoost or CatBoost (see [fusion.gradient_boosting]).
classifier = "mlp"

# Cap on the number of (sample, view) rows fed to classical classifiers.
# Set to -1 to enumerate the full Cartesian product of views (cheap when
# K_t=K_a=K_v=5 → 125x videos ≈ ~100k rows).  RandomForest / SVC scale
# quadratically in samples for SVC and linearly for RF, so keep this
# moderate unless you know your training time budget.
max_train_rows = -1

# ── SVM hyperparameters (used when classifier = "svm") ────────────────────────
[fusion.svm]
C       = 1.0
kernel  = "rbf"        # "linear", "rbf", "poly", "sigmoid"
gamma   = "scale"      # "scale", "auto", or a float

# ── Random Forest hyperparameters (used when classifier = "random_forest") ────
[fusion.random_forest]
n_estimators     = 500
max_depth        = 0           # 0 → None (unlimited); positive int → cap
min_samples_leaf = 2
max_features     = "sqrt"      # "sqrt", "log2", or a float in (0, 1]
n_jobs           = -1
# ── Gradient Boosting (used when classifier = "gradient_boosting") ────────────
# `library` selects between XGBoost and CatBoost.  Both are supported with
# the same hyperparameter names below where they overlap.
[fusion.gradient_boosting]
library          = "xgboost"   # "xgboost" or "catboost"
n_estimators     = 400
max_depth        = 6
learning_rate    = 0.05
subsample        = 0.8         # xgboost only
colsample_bytree = 0.8         # xgboost only
reg_lambda       = 1.0         # L2 leaf regularisation (CatBoost calls it l2_leaf_reg)
n_jobs           = -1          # xgboost only


# ── Training (stage 2) ────────────────────────────────────────────────────────
[training]
epochs        = 50
batch_size    = 16
learning_rate = 5e-5
weight_decay  = 5e-2
num_workers   = 0
seed          = 42
grad_clip     = 1.0
scheduler     = "cosine"
early_stopping_patience = 5

# NOTE: Late-fusion per-modality overrides have been moved to
# ``config_late_fusion.toml`` and are consumed exclusively by
# ``late_fusion_training.py``.

# ── Output ────────────────────────────────────────────────────────────────────
[output]
weights_dir  = "weights"
weights_name = "fusion_bah_best.pth"
